name: Archive Extracted Reproduction

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  archive-extracted-reproduction:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verifier dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-input numpy scipy pandas matplotlib seaborn pyyaml tqdm sgp4 pytest

      - name: Run archive-extracted verifier
        run: |
          mkdir -p results/validation
          python scripts/verify_archive_extracted_reproduction.py --archive release/spot_od_v1_2_3_acf_holdout_audit_review_archive.zip --json-out results/validation/github_actions_archive_extracted_reproduction.json --md-out results/validation/github_actions_archive_extracted_reproduction.md

      - name: Upload verifier outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-actions-archive-extracted-reproduction
          if-no-files-found: warn
          path: |
            results/validation/github_actions_archive_extracted_reproduction.json
            results/validation/github_actions_archive_extracted_reproduction.md
