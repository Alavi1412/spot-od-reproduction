name: Archive-extracted reproduction

on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  archive-extracted-reproduction:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verifier dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run archive-extracted verifier
        id: verify
        continue-on-error: true
        run: |
          python scripts/verify_archive_extracted_reproduction.py \
            --archive release/spot_od_v1_1_0_supplement_review_archive.zip \
            --json-out results/validation/github_actions_archive_extracted_reproduction.json \
            --md-out results/validation/github_actions_archive_extracted_reproduction.md

      - name: Run GraphAnchorPairGate PoC verifier
        id: graph_verify
        continue-on-error: true
        run: |
          python scripts/verify_graph_anchor_gate_poc.py \
            --archive release/spot_od_v1_2_1_graph_anchor_gate_poc.zip \
            --json-out results/validation/github_actions_graph_anchor_gate_poc_v121_verification.json \
            --md-out results/validation/github_actions_graph_anchor_gate_poc_v121_verification.md

      - name: Write GitHub Actions attestation
        id: attest
        if: always()
        continue-on-error: true
        run: |
          python scripts/write_github_actions_attestation.py

      - name: Upload reproduction reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archive-extracted-reproduction-reports
          if-no-files-found: warn
          path: |
            results/validation/github_actions_archive_extracted_reproduction.json
            results/validation/github_actions_archive_extracted_reproduction.md
            results/validation/github_actions_reproduction_attestation.json
            results/validation/github_actions_reproduction_attestation.md
            results/validation/archive_extracted_real_slr_sp3_od_slice_rerun.json
            results/validation/archive_extracted_real_slr_sp3_od_slice_rerun.md
            results/validation/archive_extracted_real_slr_sp3_od_slice_rerun/**
            results/validation/github_actions_graph_anchor_gate_poc_v121_verification.json
            results/validation/github_actions_graph_anchor_gate_poc_v121_verification.md

      - name: Fail on verifier or attestation failure
        if: steps.verify.outcome != 'success' || steps.graph_verify.outcome != 'success' || steps.attest.outcome != 'success'
        run: exit 1
