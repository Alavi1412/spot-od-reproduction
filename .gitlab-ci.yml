stages:
  - reproduce

variables:
  PYTHONDONTWRITEBYTECODE: "1"
  MPLBACKEND: "Agg"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "pip-${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip/

archive_extracted_reproduction:
  stage: reproduce
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: manual
  before_script:
    - python -m pip install --upgrade pip
    - python -m pip install --no-input numpy scipy pandas matplotlib seaborn pyyaml tqdm sgp4 pytest
  script:
    - mkdir -p results/validation
    - |
      set +e
      python scripts/verify_archive_extracted_reproduction.py --archive release/spot_od_v1_1_0_supplement_review_archive.zip --json-out results/validation/gitlab_ci_archive_extracted_reproduction.json --md-out results/validation/gitlab_ci_archive_extracted_reproduction.md
      verifier_status=$?
      set -e
      export VERIFIER_STATUS="$verifier_status"
      python - <<'PY'
      from __future__ import annotations

      import datetime as dt
      import hashlib
      import json
      import os
      from pathlib import Path

      OUT_DIR = Path("results/validation")
      VERIFIER_JSON = OUT_DIR / "gitlab_ci_archive_extracted_reproduction.json"
      VERIFIER_MD = OUT_DIR / "gitlab_ci_archive_extracted_reproduction.md"
      ATTESTATION_JSON = OUT_DIR / "gitlab_ci_reproduction_attestation.json"
      ATTESTATION_MD = OUT_DIR / "gitlab_ci_reproduction_attestation.md"
      ARCHIVE = Path("release/spot_od_v1_1_0_supplement_review_archive.zip")
      MANIFEST = Path("release/SUPPLEMENTARY_MANIFEST.json")

      def sha256_file(path: Path) -> str | None:
          if not path.is_file():
              return None
          digest = hashlib.sha256()
          with path.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                  digest.update(chunk)
          return digest.hexdigest()

      def file_record(path: Path) -> dict[str, object]:
          return {
              "path": path.as_posix(),
              "exists": path.is_file(),
              "bytes": path.stat().st_size if path.is_file() else None,
              "sha256": sha256_file(path),
          }

      try:
          verifier_result = json.loads(VERIFIER_JSON.read_text(encoding="utf-8"))
      except Exception as exc:
          verifier_result = {"status": "unreadable", "error": repr(exc)}

      statement = (
          "A passing private GitLab CI job on shared runners is archive-extracted "
          "reproduction evidence only. It is not DOI/public archive evidence, "
          "not operational POD validation, not a full scientific rerun, and not "
          "third-party independent validation. Until a GitLab CI job has passed "
          "and its job URL and artifacts are attached or cited, this remains a "
          "CI route/request rather than completed independent-machine reproduction."
      )
      ci_metadata = {
          "CI_PROJECT_PATH": os.getenv("CI_PROJECT_PATH"),
          "CI_PROJECT_URL": os.getenv("CI_PROJECT_URL"),
          "CI_PIPELINE_ID": os.getenv("CI_PIPELINE_ID"),
          "CI_PIPELINE_URL": os.getenv("CI_PIPELINE_URL"),
          "CI_JOB_ID": os.getenv("CI_JOB_ID"),
          "CI_JOB_URL": os.getenv("CI_JOB_URL"),
          "CI_COMMIT_SHA": os.getenv("CI_COMMIT_SHA"),
          "CI_COMMIT_REF_NAME": os.getenv("CI_COMMIT_REF_NAME"),
          "CI_RUNNER_ID": os.getenv("CI_RUNNER_ID"),
          "CI_RUNNER_DESCRIPTION": os.getenv("CI_RUNNER_DESCRIPTION"),
          "CI_RUNNER_EXECUTABLE_ARCH": os.getenv("CI_RUNNER_EXECUTABLE_ARCH"),
          "CI_RUNNER_TAGS": os.getenv("CI_RUNNER_TAGS"),
      }
      attestation = {
          "schema_version": "gitlab_ci_archive_extracted_reproduction_attestation_v1",
          "generated_utc": dt.datetime.now(dt.UTC).isoformat().replace("+00:00", "Z"),
          "ci_metadata": ci_metadata,
          "verifier_command": (
              "python scripts/verify_archive_extracted_reproduction.py "
              "--archive release/spot_od_v1_1_0_supplement_review_archive.zip "
              "--json-out results/validation/gitlab_ci_archive_extracted_reproduction.json "
              "--md-out results/validation/gitlab_ci_archive_extracted_reproduction.md"
          ),
          "verifier_exit_code": int(os.getenv("VERIFIER_STATUS", "1")),
          "verifier_report_status": verifier_result.get("status"),
          "archive": file_record(ARCHIVE),
          "manifest": file_record(MANIFEST),
          "verifier_outputs": {
              "json": file_record(VERIFIER_JSON),
              "markdown": file_record(VERIFIER_MD),
          },
          "interpretation_boundary": statement,
      }
      ATTESTATION_JSON.write_text(
          json.dumps(attestation, indent=2, sort_keys=True) + "\n",
          encoding="utf-8",
      )

      lines = [
          "# GitLab CI Archive-Extracted Reproduction Attestation",
          "",
          f"Verifier status: **{str(attestation['verifier_report_status']).upper()}**",
          f"Verifier exit code: `{attestation['verifier_exit_code']}`",
          "",
          "## CI Metadata",
      ]
      for key, value in ci_metadata.items():
          lines.append(f"- `{key}`: `{value}`")
      lines += [
          "",
          "## Input Hashes",
          f"- Archive SHA-256: `{attestation['archive']['sha256']}`",
          f"- Manifest SHA-256: `{attestation['manifest']['sha256']}`",
          "",
          "## Verifier Output Hashes",
          f"- JSON SHA-256: `{attestation['verifier_outputs']['json']['sha256']}`",
          f"- Markdown SHA-256: `{attestation['verifier_outputs']['markdown']['sha256']}`",
          "",
          "## Interpretation Boundary",
          statement,
      ]
      ATTESTATION_MD.write_text("\n".join(lines) + "\n", encoding="utf-8")
      PY
      exit "$verifier_status"
  artifacts:
    when: always
    expire_in: 90 days
    paths:
      - results/validation/gitlab_ci_archive_extracted_reproduction.json
      - results/validation/gitlab_ci_archive_extracted_reproduction.md
      - results/validation/gitlab_ci_reproduction_attestation.json
      - results/validation/gitlab_ci_reproduction_attestation.md
