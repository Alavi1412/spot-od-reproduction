tuning:
  enabled: true
  study_name: hybrid_search
  storage: sqlite:///results/tuning/hybrid_search.db
  target_model: InnovationHybridGNN
  train_splits: [train, stress_train]
  val_splits: [val, stress_val, satnogs_observation_replay_val]
  n_trials: 12
  timeout_sec: 7200
  search_space:
    hidden_dim: [192, 256, 320]
    dropout: [0.10, 0.15, 0.20]
    residual_scale: [0.02, 0.03, 0.05]
    fusion_temperature: [0.70, 0.85, 1.00]
    residual_activity_weight: [0.02, 0.05, 0.08]
    fusion_entropy_weight: [0.01, 0.02, 0.04]

benchmark_tasks:
  name: SPOT-OD
  subtitle: Sparse public observation and tracking orbit-determination benchmark
  state_estimation_train_scenarios: [train, stress_train]
  state_estimation_scenarios:
    [test, stress_test, semi_real_replay_test, public_catalog_replay_test, satnogs_observation_replay_test, satnogs_observation_replay_stress_test]
  task_train_scenarios: [test, stress_test, satnogs_observation_replay_val]
  task_eval_scenarios: [satnogs_observation_replay_test, satnogs_observation_replay_stress_test]
  selector_methods:
    [EKF, UKF, AUKF, KalmanNetLike, NoGraphResidual, LearnedNoiseAdaptive, HybridGNN, InnovationHybridGNN]
  selector_divergence_penalty_m: 1.0e8
  divergence_thresholds:
    pos_rmse_m: 1.0e8
    vel_rmse_mps: 1.0e5

scorecard_thresholds:
  min_delta_vs_ekf_mean_m: 10.0
  min_fraction_steps_delta_vs_ekf_gt_10m: 0.10
  min_stress_improvement_vs_ukf_percent: 2.0
  max_nominal_degradation_vs_best_classical_percent: 0.5

output:
  checkpoint_dir: results/checkpoints
  metrics_path: results/metrics_summary.json
  per_step_path: results/per_step_errors.csv
  figure_dir: results/figures
  env_report_path: results/runtime/env_report.json
  manifest_dir: results/manifests
